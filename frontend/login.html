<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | POTENZIA 24</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<main class="auth-page">

  <section class="auth-card">

    <div class="auth-header">
      <a href="index.html" class="logo"><span>POTENZIA</span>24</a>
      <p class="eyebrow">Panel editorial</p>
      <h1>Iniciar sesión</h1>
      <p>Accede para administrar revistas, publicaciones y contenido editorial.</p>
    </div>

    <form id="loginForm" class="auth-form">

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="Tu contraseña">
      </div>

      <button type="submit" class="btn-primary">Entrar</button>

      <p class="auth-link">
        ¿No tienes cuenta?
        <a href="register.html">Crear cuenta</a>
      </p>

    </form>

  </section>

</main>

<script src="js/config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
