<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | POTENZIA 24</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<main class="auth-page">

  <section class="auth-card large">

    <div class="auth-header">
      <a href="index.html" class="logo"><span>POTENZIA</span>24</a>
      <p class="eyebrow">Nueva cuenta</p>
      <h1>Crear usuario</h1>
      <p>Registra una cuenta para acceder al panel editorial.</p>
    </div>

    <form id="registerForm" class="auth-form">

      <div class="form-grid">

        <div class="field">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="field">
          <label for="lastname">Apellido</label>
          <input type="text" id="lastname" name="lastname" required>
        </div>

        <div class="field full">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required minlength="6">
        </div>

        <div class="field">
          <label for="age">Edad</label>
          <input type="number" id="age" name="age" min="1" required>
        </div>

        <div class="field">
          <label for="idCountry">País</label>
          <select id="idCountry" name="idCountry" required>
            <option value="">Seleccionar país</option>
          </select>
        </div>

        <div class="field">
          <label for="idState">Estado</label>
          <select id="idState" name="idState" required>
            <option value="">Seleccionar estado</option>
          </select>
        </div>

        <div class="field">
          <label for="idCity">Ciudad</label>
          <select id="idCity" name="idCity" required>
            <option value="">Seleccionar ciudad</option>
          </select>
        </div>

        <div class="field">
          <label for="idRol">Rol</label>
          <select id="idRol" name="idRol" required>
            <option value="1">Administrador</option>
            <option value="2">Editor</option>
          </select>
        </div>

        <div class="field full">
          <label for="image">Imagen de perfil</label>
          <input type="file" id="image" name="image" accept=".png,.jpg,.jpeg,.webp,image/*">
        </div>

      </div>

      <button type="submit" class="btn-primary">Crear cuenta</button>

      <p class="auth-link">
        ¿Ya tienes cuenta?
        <a href="login.html">Iniciar sesión</a>
      </p>

    </form>

  </section>

</main>

<script src="js/register.js"></script>
</body>
</html>
